<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Project Detail</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }
        .card { border-radius: 12px; }
        .big { font-size: 22px; font-weight: bold; }
    </style>
</head>

<body>

<div class="container mt-4">

    <!-- PROJECT HEADER -->
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h3 th:text="${project.projectName}"></h3>
            <p>
                Client: <b th:text="${project.client.name}"></b><br>
                Location: <span th:text="${project.location}"></span>
            </p>
        </div>

        <!-- ✅ EDIT BUTTON -->
        <a th:href="@{'/projects/edit/' + ${project.id}}"
           class="btn btn-warning">
            ✏️ Edit
        </a>
    </div>

    <!-- FINANCIAL SUMMARY -->
    <div class="row mb-4">

        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <div>Total Cost</div>
                <div class="big" th:text="${project.totalCost}"></div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <div class="text-success">Paid</div>
                <div class="big" th:text="${totalPaid}"></div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <div class="text-danger">Pending</div>
                <div class="big" th:text="${pending}"></div>
            </div>
        </div>

    </div>

    <!-- PROGRESS BAR -->
    <div class="card p-3 mb-4">
        <div class="d-flex justify-content-between align-items-center">
            <div>Progress</div>

            <!-- Update Form -->
            <form th:action="@{'/projects/' + ${project.id} + '/progress'}"
                  method="post"
                  class="d-flex gap-2">

                <input type="number"
                       name="progress"
                       class="form-control form-control-sm"
                       style="width: 80px"
                       min="0" max="100"
                       th:value="${project.progressPercent}">

                <button class="btn btn-sm btn-warning">Update</button>
            </form>
        </div>

        <!-- Progress Bar -->
        <div class="progress mt-2">
            <div class="progress-bar bg-success"
                 th:style="'width:' + ${project.progressPercent} + '%'"
                 th:text="${project.progressPercent + '%'}">
            </div>
        </div>
    </div>

    <!-- PAYMENT HISTORY -->
    <div class="card p-3 mb-4 shadow-sm">
        <h5>Payment History</h5>

        <table class="table table-striped">
            <thead>
            <tr>
                <th>Date</th>
                <th>Amount</th>
                <th>Mode</th>
                <th>Note</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="p : ${payments}">
                <td th:text="${p.paymentDate}"></td>
                <td th:text="${p.amount}"></td>
                <td th:text="${p.paymentMode}"></td>
                <td th:text="${p.note}"></td>
            </tr>

            <tr th:if="${#lists.isEmpty(payments)}">
                <td colspan="4" class="text-center">No payments yet</td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- ADD PAYMENT -->
    <div class="card p-4 shadow-sm">
        <h5>Add Payment</h5>

        <div th:if="${error == 'invalid_amount'}"
             class="alert alert-danger">
            Invalid amount entered
        </div>

        <div th:if="${error == 'overpayment'}"
             class="alert alert-warning">
            Payment exceeds pending amount
        </div>

        <form th:action="@{'/projects/' + ${project.id} + '/payment'}"
              method="post"
              th:object="${newPayment}">

            <div class="row g-3">

                <div class="col-md-3">
                    <label class="form-label">Amount</label>
                    <input type="number"
                           step="0.01"
                           min="1"
                           required
                           class="form-control"
                           th:field="*{amount}">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Date</label>
                    <input type="date"
                           class="form-control"
                           th:field="*{paymentDate}"
                           th:value="${#temporals.format(#temporals.createNow(),'yyyy-MM-dd')}">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Mode</label>
                    <select class="form-select" th:field="*{paymentMode}" required>
                        <option value="">Select</option>
                        <option value="CASH">Cash</option>
                        <option value="UPI">UPI</option>
                        <option value="BANK">Bank</option>
                        <option value="CHEQUE">Cheque</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Note</label>
                    <input type="text"
                           class="form-control"
                           placeholder="Optional"
                           th:field="*{note}">
                </div>

            </div>

            <div class="mt-3 d-flex justify-content-between">
                <small class="text-muted">
                    Pending: ₹ <span th:text="${pending}"></span>
                </small>

                <button class="btn btn-success">
                    + Add Payment
                </button>
            </div>

        </form>
    </div>

</div>

<!-- ✅ TOAST CONTAINER -->
<div class="position-fixed top-0 end-0 p-3" style="z-index: 9999">

    <!-- SUCCESS TOAST -->
    <div th:if="${success}" class="toast align-items-center text-bg-success border-0 show" role="alert">
        <div class="d-flex">
            <div class="toast-body" th:text="${success}"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"
                    onclick="this.parentElement.parentElement.remove()"></button>
        </div>
    </div>

    <!-- ERROR TOAST -->
    <div th:if="${error}" class="toast align-items-center text-bg-danger border-0 show" role="alert">
        <div class="d-flex">
            <div class="toast-body">
                <span th:if="${error == 'invalid_amount'}">Invalid amount entered</span>
                <span th:if="${error == 'overpayment'}">Payment exceeds pending amount</span>
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"
                    onclick="this.parentElement.parentElement.remove()"></button>
        </div>
    </div>

</div>

<script>
    setTimeout(() => {
        document.querySelectorAll('.toast').forEach(t => t.remove());
    }, 3000); // disappears in 3 sec
</script>

</body>
</html>
