<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Add New Project</h4>
        </div>

        <div class="card-body">

            <form th:action="@{${project.id} != null ? '/projects' : '/projects'}"
                  method="post"
                  th:object="${project}">

                <input type="hidden" th:field="*{id}">

                <!-- ROW 1 -->
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Project Name</label>
                        <input type="text" class="form-control"
                               placeholder="Enter project name"
                               th:field="*{projectName}" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Client</label>
                        <select class="form-control" th:field="*{clientId}" required>
                            <option value="">Select Client</option>
                            <option th:each="c : ${clients}"
                                    th:value="${c.id}"
                                    th:text="${c.name}">
                            </option>
                        </select>
                    </div>
                </div>

                <!-- ROW 2 -->
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Total Cost</label>
                        <input type="number" class="form-control"
                               placeholder="Enter total cost"
                               th:field="*{totalCost}" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Status</label>
                        <select class="form-control" th:field="*{status}">
                            <option value="ONGOING">ONGOING</option>
                            <option value="COMPLETED">COMPLETED</option>
                        </select>
                    </div>
                </div>

                <!-- ROW 3 -->
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Progress (%)</label>
                        <input type="number" class="form-control"
                               min="0" max="100"
                               placeholder="0 - 100"
                               th:field="*{progressPercent}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Location</label>
                        <input type="text" class="form-control"
                               placeholder="Project location"
                               th:field="*{location}">
                    </div>
                </div>

                <!-- ACTION BUTTONS -->
                <div class="d-flex justify-content-between mt-4">
                    <a href="/projects" class="btn btn-secondary">← Back</a>
                    <button type="submit" class="btn btn-success">
                        Save Project
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
