<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Projects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h3>Projects</h3>

<a href="/projects/new" class="btn btn-primary mb-3">+ Add Project</a>

<table class="table table-bordered">
    <thead>
    <tr>
        <th>Name</th>
        <th>Client</th>
        <th>Total Cost</th>
        <th>Status</th>
        <th>Action</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="p : ${projects}">
        <td th:text="${p.projectName}"></td>
        <td th:text="${p.client.name}"></td>
        <td th:text="${p.totalCost}"></td>
        <td th:text="${p.status}"></td>
        <td>
            <a th:href="@{'/projects/' + ${p.id}}" class="btn btn-sm btn-success">
                View
            </a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
